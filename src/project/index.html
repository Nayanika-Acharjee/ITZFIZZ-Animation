<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bike Parallax Scene</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body {
  margin: 0;
  overflow-x: hidden;
}

.scrollElement {
  position: relative;
}

/* BACKGROUND SVG */
svg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
  pointer-events: none;
}

/* SCENE CONTENT */
.section {
  height: 100vh;
  position: relative;
  z-index: 2;
  
}

/* ROAD */
.road {
  position: sticky;
  top: 0;
  width: 100%;
  height: 105vh;
  object-fit: contain;
  z-index: 2;
}

/* BIKE */
.bike {
  position: absolute;
  top: 12%;
  left: -5%;
  width: 380px;
  z-index: 3;
}

/* BANNER */
.banner {
  position: absolute;
  top: 32%;              
  left: 3%;
  transform: translateY(-30%);
    z-index: 4;
  width: auto;          
  overflow: visible;     
  white-space: nowrap;
}


.title span {
  opacity: 0;
  transform: translateY(20px);
  display: inline-block;
  
  font-size: 1.5em;
  font-weight: 650; 
}

.space {
  display: inline-block;
  width: 20px; 
}
/* When banner reveals, letters animate */
.banner.reveal .title span {
  opacity: 1;
  transform: translateY(0);
}

.title.show {
  transform: translateY(0) scale(1.1);
}

/* stagger using nth-child */ 
.title span:nth-child(1) { transition: 0.3s ease 0.1s; }
.title span:nth-child(2) { transition: 0.3s ease 0.2s; }
.title span:nth-child(3) { transition: 0.3s ease 0.3s; }
.title span:nth-child(4) { transition: 0.3s ease 0.4s; }
.title span:nth-child(5) { transition: 0.3s ease 0.5s; }
.title span:nth-child(6) { transition: 0.3s ease 0.6s; }
.title span:nth-child(7) { transition: 0.3s ease 0.7s; }
.title span:nth-child(8) { transition: 0.3s ease 0.8s; }
.title span:nth-child(9) { transition: 0.3s ease 0.9s; }
.title span:nth-child(10){ transition: 0.3s ease 1.0s; }
.title span:nth-child(11){ transition: 0.3s ease 1.1s; }
.title span:nth-child(12){ transition: 0.3s ease 1.2s; }
.title span:nth-child(13){ transition: 0.3s ease 1.3s; }
.title span:nth-child(14){ transition: 0.3s ease 1.4s; }
.title span:nth-child(15){ transition: 0.3s ease 1.5s; }

/* METRICS */

.metrics {
  position: absolute;
  bottom: 8%;
  left: 8%;
  display: flex;
  gap: 50px;
  z-index: 5; /* above road + bike */
}

/* CARD */
.card {
  background: rgba(255, 255, 255, 0.06);
 padding: 32px 38px; 
  border-radius: 14px;

  opacity: 0;
  transform: translateY(40px);

  backdrop-filter: blur(10px);
  color: white;
}

.card h3 {
  margin: 0;
  font-size: 1.5rem;
}

.card p {
  margin: 5px 0 0;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- ================= SCROLL SECTION ================= -->
<div class="section">
    <section class="hero">

  <img class="bike" src="./rider2.png">
 <!-- BANNER -->
<div class="banner">

    <span>W</span>

<!-- METRICS -->

  <div class="card">
    <h3>98%</h3>

  </div>

    <h3>120+</h3>

  <div class="card">
    <h3>10K+</h3>

  </div>
</div>

<script>

gsap.registerPlugin(ScrollTrigger);

/* ================= MASTER TIMELINE ================= */
const tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".scrollElement",
    start: "top top",
    end: "200% top",
    scrub: 2,
    pin: true
  }
});

/* 🚗 BIKE */
tl.to(".bike", {
  x: () => window.innerWidth * 0.75,
  ease: "none"
}, 0);

/* ☀️ SUN */
tl.to("#sun", {
  x: -250,
  y: 180,
  scale: 0.85,
  ease: "none"
}, 0);

/* ☁️ CLOUDS */
tl.to("#cloud1", { x: 250, ease: "none" }, 0);
tl.to("#cloud2", { x: 400, ease: "none" }, 0);
tl.to("#cloud3", { x: -300, ease: "none" }, 0);
tl.to("#cloud4", { x: 300, ease: "none" }, 0);

/* 🐦 BIRDS */
tl.to("#birds", {
  x: -300,
  y: 60,
  ease: "none"
}, 0);

/* 🏔️ MOUNTAINS */
tl.to("#mountainBack", { y: 60, ease: "none" }, 0);
tl.to("#mountainFront", { y: 120, ease: "none" }, 0);

/* 🌳 TREES */
tl.to("#trees", { y: 30, ease: "none" }, 0);

/*banner*/

gsap.to(".banner", {
  width: "100%",
  ease: "none",
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "bottom bottom",
    scrub: true
  }
});

ScrollTrigger.create({
  trigger: ".hero",
  start: "top top",
  end: "20% top",
  onEnter: () => document.querySelector(".banner").classList.add("reveal"),
  onLeaveBack: () => document.querySelector(".banner").classList.remove("reveal")
});




gsap.to(".card", {
  opacity: 1,
  y: 0,
  duration: 0.6,
  stagger: 0.2,
  ease: "power2.out",
  scrollTrigger: {
    trigger: ".hero",
    start: "60% center",
    end: "bottom bottom",
    toggleActions: "play none none reverse"
  }
});

</script>

</html>
